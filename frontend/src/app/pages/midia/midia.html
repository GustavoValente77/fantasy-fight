<div class="midia-container">

  <div class="post-box">
    <textarea 
      [(ngModel)]="novoPost"
      placeholder="O que você está pensando..."
    ></textarea>

    <button (click)="postar()">Postar</button>
  </div>

  <div class="feed">
    <div class="post-card" *ngFor="let post of posts">
      <div class="post-header">
        <strong>{{ post.user }}</strong>
        <span>{{ post.time }}</span>
      </div>

      <p>{{ post.content }}</p>
    </div>
  </div>

</div>
