<div class="score-container">

  <h1>Ranking</h1>

  <div class="leaderboard">
    <div 
      class="player-card" 
      *ngFor="let player of ranking; let i = index"
      [class.top1]="i === 0"
      [class.top2]="i === 1"
      [class.top3]="i === 2"
    >
      <div class="position">#{{ i + 1 }}</div>

      <div class="player-info">
        <strong>{{ player.nome }}</strong>
        <span>{{ player.pontos }} pts</span>
      </div>
    </div>
  </div>

</div>
