<div class="profile-page">

  <div class="banner"></div>

  <div class="profile-card">
    
    <div class="avatar-big">
      {{ user?.nome?.charAt(0) }}
    </div>

    <h2>{{ user?.nome }}</h2>

    <p class="username">@{{ user?.nome?.toLowerCase().replace(' ', '') }}</p>

    <button class="edit-btn">Editar Perfil</button>

  </div>

</div>
